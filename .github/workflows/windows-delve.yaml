name: windows-delve

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            msvc_arch: x64
            pe_machine: x64
            runs_on: windows-2022
          - arch: aarch64
            msvc_arch: arm64
            pe_machine: ARM64
            runs_on: windows-11-arm

    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: build
        run: go run _scripts/make.go build

      - name: Setup MSVC (${{ matrix.msvc_arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Verify PE machine
        shell: bash
        run: |
          set -euo pipefail
          echo "File: dlv.exe"
          dumpbin //HEADERS dlv.exe | grep -E "machine \(.*\)" | head -1
          echo
          MACHINE=$(dumpbin //HEADERS dlv.exe | grep -E "machine \(.*\)" | head -1 | sed -E 's/.*machine \(([^)]*)\).*/\1/')
          if [ "$MACHINE" != "${{ matrix.pe_machine }}" ]; then
              echo "::error::PE machine mismatch. Expected '${{ matrix.pe_machine }}' for ${{ matrix.arch }}, got '$MACHINE'."
              exit 1
          fi
          echo "OK: PE machine is '$MACHINE' as expected."

      - uses: actions/upload-artifact@v4
        with:
          name: dlv-windows-${{ matrix.arch }}
          path: dlv.exe
          if-no-files-found: error

  publish:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: binaries-publish
      cancel-in-progress: false
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Arrange binaries by os-arch
        run: |
          set -euo pipefail
          mkdir -p out
          for dir in artifacts/dlv-windows-*/; do
            name=$(basename "$dir")
            arch="${name#dlv-windows-}"
            mkdir -p "out/windows-$arch"
            cp "$dir"dlv.exe "out/windows-$arch/"
          done
          find out -type f

      - name: Commit and push to consulo/binaries
        env:
          CONSULO_BOT_TOKEN: ${{ secrets.CONSULO_BOT_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://consulo-bot:${CONSULO_BOT_TOKEN}@github.com/consulo/binaries.git" binaries-repo
          cd binaries-repo
          git checkout master 2>/dev/null || git checkout --orphan master
          git config user.name "consulo Bot"
          git config user.email "consulo.bot@gmail.com"
          cp -r ../out/. .
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update delve windows binaries from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"
            git push -u origin master
          fi
