name: mac-delve

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            macho_arch: x86_64
            runs_on: macos-latest
            goarch: amd64
            cross: true
          - arch: aarch64
            macho_arch: arm64
            runs_on: macos-latest
            goarch: arm64
            cross: false

    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: build (native)
        if: ${{ !matrix.cross }}
        run: go run _scripts/make.go build

      - name: build (cross x86_64 on arm64 runner)
        if: matrix.cross
        env:
          CGO_ENABLED: '1'
          CC: clang -arch x86_64
          CXX: clang++ -arch x86_64
        run: go run _scripts/make.go build --GOOS=darwin --GOARCH=${{ matrix.goarch }}

      - name: Verify Mach-O architecture
        run: |
          set -euo pipefail
          echo "File: dlv"
          lipo -archs dlv
          echo
          ARCHS=$(lipo -archs dlv)
          if [ "$ARCHS" != "${{ matrix.macho_arch }}" ]; then
              echo "::error::Mach-O arch mismatch. Expected '${{ matrix.macho_arch }}' for ${{ matrix.arch }}, got '$ARCHS'."
              exit 1
          fi
          echo "OK: Mach-O arch is '$ARCHS' as expected."

      - uses: actions/upload-artifact@v4
        with:
          name: dlv-macos-${{ matrix.arch }}
          path: dlv
          if-no-files-found: error

  publish:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: binaries-publish
      cancel-in-progress: false
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Arrange binaries by os-arch
        run: |
          set -euo pipefail
          mkdir -p out
          for dir in artifacts/dlv-macos-*/; do
            name=$(basename "$dir")
            arch="${name#dlv-macos-}"
            mkdir -p "out/macos-$arch"
            cp "$dir"dlv "out/macos-$arch/"
            chmod +x "out/macos-$arch/dlv"
          done
          find out -type f

      - name: Commit and push to consulo/binaries
        env:
          CONSULO_BOT_TOKEN: ${{ secrets.CONSULO_BOT_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://consulo-bot:${CONSULO_BOT_TOKEN}@github.com/consulo/binaries.git" binaries-repo
          cd binaries-repo
          git checkout master 2>/dev/null || git checkout --orphan master
          git config user.name "consulo Bot"
          git config user.email "consulo.bot@gmail.com"
          cp -r ../out/. .
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update delve macos binaries from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"
            git push -u origin master
          fi
